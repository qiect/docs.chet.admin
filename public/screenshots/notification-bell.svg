<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 650" font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace">
  <rect width="1100" height="650" fill="#11151F"/>
  <rect x="1" y="1" width="1098" height="648" fill="none" stroke="#0066FF" stroke-width="2" stroke-dasharray="6 4"/>
  <circle cx="24" cy="24" r="5" fill="#3B82F6"/>

  <!-- Title -->
  <text x="550" y="42" text-anchor="middle" fill="#E8ECF4" font-size="18" font-weight="600">通知铃铛</text>
  <text x="550" y="62" text-anchor="middle" fill="#9CA3AF" font-size="11">Header Notification Bell &amp; Dropdown Popover</text>

  <!-- Fake app header bar -->
  <rect x="40" y="85" width="1020" height="56" rx="6" fill="#1A2033" stroke="#2A3550"/>
  <rect x="56" y="100" width="26" height="26" rx="5" fill="#1E40AF"/>
  <text x="69" y="118" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="700">C</text>
  <text x="92" y="119" fill="#E8ECF4" font-size="14" font-weight="600">Chet.Admin</text>
  <text x="200" y="119" fill="#9CA3AF" font-size="12">仪表盘</text>
  <text x="270" y="119" fill="#9CA3AF" font-size="12">系统</text>
  <text x="330" y="119" fill="#9CA3AF" font-size="12">用户</text>
  <rect x="430" y="100" width="240" height="28" rx="4" fill="#11151F" stroke="#2A3550"/>
  <circle cx="448" cy="114" r="4" fill="none" stroke="#6B7280" stroke-width="1.4"/>
  <line x1="451" y1="117" x2="455" y2="121" stroke="#6B7280" stroke-width="1.4"/>
  <text x="464" y="119" fill="#6B7280" font-size="11">搜索功能...</text>
  <text x="938" y="119" fill="#9CA3AF" font-size="12">admin</text>
  <circle cx="1030" cy="113" r="12" fill="#1E40AF"/>
  <text x="1030" y="117" text-anchor="middle" fill="#FFFFFF" font-size="11" font-weight="700">A</text>

  <!-- Bell icon with red badge -->
  <path d="M 992 121 L 993 114 C 993 109, 1007 109, 1007 114 L 1008 121 Z" fill="none" stroke="#C8D0E0" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M 998 109 Q 1000 106 1002 109" fill="none" stroke="#C8D0E0" stroke-width="1.6" stroke-linecap="round"/>
  <circle cx="1000" cy="124" r="1.8" fill="#C8D0E0"/>
  <circle cx="1011" cy="105" r="8" fill="#F87171" stroke="#1A2033" stroke-width="1.5"/>
  <text x="1011" y="108" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">3</text>

  <!-- Pointer arrow from popover to bell -->
  <path d="M 1002 150 L 1018 150 L 1010 141 Z" fill="#1A2033" stroke="#2A3550"/>

  <!-- Dropdown popover -->
  <rect x="620" y="150" width="400" height="440" rx="8" fill="#1A2033" stroke="#2A3550"/>

  <!-- Popover header -->
  <text x="640" y="178" fill="#E8ECF4" font-size="14" font-weight="600">通知</text>
  <text x="1000" y="178" text-anchor="end" fill="#60A5FA" font-size="12">全部已读</text>
  <line x1="632" y1="190" x2="1008" y2="190" stroke="#2A3550"/>

  <!-- Item 1 - unread Announcement -->
  <rect x="620" y="190" width="3" height="70" fill="#3B82F6"/>
  <rect x="642" y="208" width="20" height="20" rx="4" fill="#1D4ED8"/>
  <text x="652" y="222" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">公</text>
  <text x="672" y="216" fill="#E8ECF4" font-size="13" font-weight="500">系统将于今晚 23:00 维护</text>
  <text x="672" y="234" fill="#9CA3AF" font-size="11">预计停机 30 分钟，请提前保存工作...</text>
  <text x="672" y="251" fill="#6B7280" font-size="10">5 分钟前</text>
  <circle cx="1000" cy="225" r="3" fill="#3B82F6"/>

  <!-- Item 2 - unread Todo -->
  <rect x="620" y="260" width="3" height="70" fill="#3B82F6"/>
  <rect x="642" y="278" width="20" height="20" rx="4" fill="#C2410C"/>
  <text x="652" y="292" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">办</text>
  <text x="672" y="286" fill="#E8ECF4" font-size="13" font-weight="500">您有 3 条待办事项待处理</text>
  <text x="672" y="304" fill="#9CA3AF" font-size="11">包含 2 条高优先级任务，请尽快处理...</text>
  <text x="672" y="321" fill="#6B7280" font-size="10">32 分钟前</text>
  <circle cx="1000" cy="295" r="3" fill="#3B82F6"/>

  <!-- Item 3 - unread Notification -->
  <rect x="620" y="330" width="3" height="70" fill="#3B82F6"/>
  <rect x="642" y="348" width="20" height="20" rx="4" fill="#15803D"/>
  <text x="652" y="362" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">通</text>
  <text x="672" y="356" fill="#E8ECF4" font-size="13" font-weight="500">新版本 v1.2.0 已发布</text>
  <text x="672" y="374" fill="#9CA3AF" font-size="11">本次更新包含 5 项新功能与 8 项修复...</text>
  <text x="672" y="391" fill="#6B7280" font-size="10">1 小时前</text>
  <circle cx="1000" cy="365" r="3" fill="#3B82F6"/>

  <!-- Item 4 - read Notification -->
  <rect x="642" y="418" width="20" height="20" rx="4" fill="#15803D"/>
  <text x="652" y="432" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">通</text>
  <text x="672" y="426" fill="#9CA3AF" font-size="13">欢迎注册 Chet.Admin</text>
  <text x="672" y="444" fill="#6B7280" font-size="11">点击查看新手指南，快速上手系统...</text>
  <text x="672" y="461" fill="#6B7280" font-size="10">2 小时前</text>

  <!-- Item 5 - read Notification -->
  <rect x="642" y="488" width="20" height="20" rx="4" fill="#15803D"/>
  <text x="652" y="502" text-anchor="middle" fill="#FFFFFF" font-size="10" font-weight="700">通</text>
  <text x="672" y="496" fill="#9CA3AF" font-size="13">密码已成功修改</text>
  <text x="672" y="514" fill="#6B7280" font-size="11">如非本人操作，请及时联系管理员...</text>
  <text x="672" y="531" fill="#6B7280" font-size="10">1 天前</text>

  <!-- Footer -->
  <line x1="632" y1="558" x2="1008" y2="558" stroke="#2A3550"/>
  <text x="820" y="578" text-anchor="middle" fill="#60A5FA" font-size="12">查看全部</text>

  <!-- Annotations on the left -->
  <text x="60" y="180" fill="#60A5FA" font-size="11" font-weight="600">① 铃铛图标</text>
  <text x="60" y="196" fill="#9CA3AF" font-size="10">Badge 显示未读数 (overflow 99+)</text>
  <text x="60" y="210" fill="#6B7280" font-size="10">每 30s 轮询刷新 unreadCount</text>

  <text x="60" y="270" fill="#60A5FA" font-size="11" font-weight="600">② Popover 弹出层</text>
  <text x="60" y="286" fill="#9CA3AF" font-size="10">placement="bottomRight" trigger="click"</text>
  <text x="60" y="300" fill="#6B7280" font-size="10">打开时拉取最新 5 条通知</text>

  <text x="60" y="360" fill="#60A5FA" font-size="11" font-weight="600">③ 未读高亮</text>
  <text x="60" y="376" fill="#9CA3AF" font-size="10">左侧蓝色边框 + 蓝点标记</text>
  <text x="60" y="390" fill="#6B7280" font-size="10">点击 → markAsRead + 弹详情 Modal</text>

  <text x="60" y="450" fill="#60A5FA" font-size="11" font-weight="600">④ 时间格式化</text>
  <text x="60" y="466" fill="#9CA3AF" font-size="10">刚刚 / X 分钟前 / X 小时前 / X 天前</text>

  <text x="60" y="520" fill="#60A5FA" font-size="11" font-weight="600">⑤ 底部操作</text>
  <text x="60" y="536" fill="#9CA3AF" font-size="10">"查看全部" → 跳转通知管理页</text>
  <text x="60" y="550" fill="#6B7280" font-size="10">"全部已读" → markAllAsReadApi</text>
</svg>
